<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #ffffff, #f3f4ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* MAIN BOX */
.container {
    display: flex;
    width: 700px;
    height: 400px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    overflow: hidden;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #a18cd1, #c2b2ff);
    color: white;
    padding: 40px;
    clip-path: polygon(0 0, 100% 0, 70% 100%, 0% 100%);
}

.left h1 {
    margin-top: 30px;
}

.left button {
    margin-top: 30px;
    padding: 10px 20px;
    border: 2px solid white;
    background: transparent;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    padding: 40px;
}

.right h2 {
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 20px;
    border: 1px solid #ccc;
}

button.login-btn {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: 2px solid #a18cd1;
    background: transparent;
    color: #6a5acd;
    cursor: pointer;
    font-weight: bold;
}

button.login-btn:hover {
    background: #a18cd1;
    color: white;
}

/* MESSAGE STYLE */
.msg-error {
    color: rgb(236, 108, 108);
    font-weight: bold;
    margin-bottom: 10px;
}

.msg-success {
    color: rgb(126, 233, 126);
    font-weight: bold;
    margin-bottom: 10px;
}

.small {
    font-size: 12px;
    color: rgb(201, 120, 120);
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Welcome!</h1>
        <p>Create your account.<br>For Free!</p>

        <button onclick="showSignup()">Sign Up</button>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <!-- LOGIN -->
        <div id="loginForm">
            <h2>Login</h2>

            {% if error %}
            <p class="msg-error">{{error}}</p>
            {% endif %}

            {% if success %}
            <p class="msg-success">{{success}}</p>
            {% endif %}

            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username or Email" required>
                <input type="password" name="password" placeholder="Password" required>

                <button class="login-btn">Sign In 🚀</button>
            </form>

            <p class="small">Forgot password?</p>
        </div>

        <!-- SIGNUP -->
        <div id="signupForm" style="display:none;">
            <h2>Sign Up</h2>

            <form action="/signup" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <button class="login-btn">Create Account ✨</button>
            </form>

            <p class="small" onclick="showLogin()" style="cursor:pointer;">
                Already have account? Login
            </p>
        </div>

    </div>

</div>

<script>
function showSignup(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
}

function showLogin(){
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}
</script>

</body>
</html>
