<!DOCTYPE html>
<html>
<head>
<title>Update Patient</title>

<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    background: #888cb5;
}

.box {
    background:rgb(189, 189, 229);
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input, select {
    display:block;
    margin:10px 0;
    padding:10px;
    width:250px;
}

button {
    padding:10px 20px;
    background:#9f96d6;
    color:white;
    border:none;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="box">
<h2>Update Patient ✏️</h2>

<form method="POST">

<input type="text" name="name" value="{{p[1]}}" required>
<input type="number" name="age" value="{{p[2]}}" required>

<select name="gender">
    <option {% if p[3]=='Male' %}selected{% endif %}>Male</option>
    <option {% if p[3]=='Female' %}selected{% endif %}>Female</option>
</select>

<input type="number" name="bp" value="{{p[4]}}" required>
<input type="number" name="hr" value="{{p[5]}}" required>
<input type="text" name="temp" value="{{p[6]}}" required>

<button type="submit">Update </button>

</form>

</div>

</body>
</html>
