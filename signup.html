<!DOCTYPE html>
<html>
<head>
<title>Sign Up - Smart Healthcare</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    display:flex;
    width:750px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.left {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    padding:40px;
    width:50%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.left h1 {
    margin-bottom:10px;
}

.left p {
    font-size:14px;
    text-align:center;
}

.right {
    background:white;
    padding:40px;
    width:50%;
    text-align:center;
}

input {
    padding:12px;
    width:220px;
    margin:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#43cea2;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#2bbf9b;
}

a {
    text-decoration:none;
    color:#667eea;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Design Section -->
    <div class="left">
        <h1>🩺 Smart Healthcare</h1>
        <p>Join our system to monitor patients easily and manage health records smartly.</p>
    </div>

    <!-- Right Form Section -->
    <div class="right">
        <h2>Create Account ✨</h2>

    <form action="/signup" method="POST">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>

            <button type="submit">Sign Up 🚀</button>
        </form>

        <p>Already have account?</p>
        <a href="/login_page">Login here</a>

    </div>

</div>

</body>
</html>
