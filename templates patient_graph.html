<!DOCTYPE html>
<html>
<head>
<title>ECG Graph</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: rgb(242, 241, 243);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:rgb(15, 7, 20);
    font-family:Arial;
}

.box {
    text-align:center;
}

canvas {
    border:2px solid red;
    background:white;
}
</style>
</head>

<body>

<div class="box">

<h2>❤️ {{name}} ECG Monitor</h2>

<canvas id="myChart" width="900" height="400"></canvas>

<p>BP: {{bp}} | HR: {{hr}} | Temp: {{temp}}</p>

<a href="/suggest/{{id}}">
<button>Get Suggestion</button>
</a>

</div>

<script>

let hr = {{ hr }};

//  STATIC ECG DATA
function generateECG(hr) {
    let data = [];
    let cycleLength = Math.floor(6000 / hr);

    for (let i = 0; i < 200; i++) {

        let cycle = i % cycleLength;
        let val = 0;

        if (cycle === Math.floor(cycleLength * 0.1)) val = 1;
        else if (cycle === Math.floor(cycleLength * 0.2)) val = -2;
        else if (cycle === Math.floor(cycleLength * 0.22)) val = 8;
        else if (cycle === Math.floor(cycleLength * 0.25)) val = -3;
        else if (cycle === Math.floor(cycleLength * 0.4)) val = 2;
        else val = Math.random() * 0.2;

        data.push(val);
    }

    return data;
}

let ecg = generateECG(hr);

// GRID
const gridPlugin = {
    id: 'ecgGrid',
    beforeDraw: (chart) => {
        const {ctx, width, height} = chart;

        ctx.save();
        ctx.strokeStyle = "#ffcccc";
        ctx.lineWidth = 0.5;

        for (let x = 0; x < width; x += 20) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
            ctx.stroke();
        }

        for (let y = 0; y < height; y += 20) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
        }

        ctx.restore();
    }
};

// 📊 STATIC CHART
new Chart(document.getElementById("myChart"), {
    type: 'line',
    data: {
        labels: ecg.map((_, i) => i),
        datasets: [{
            data: ecg,
            borderColor: "black",
            borderWidth: 2,
            fill: false,
            tension: 0.3,
            pointRadius: 0
        }]
    },
    options: {
        animation: false,  
        plugins: {
            legend: { display: false }
        },
        scales: {
            x: { display: false },
            y: { display: false }
        }
    },
    plugins: [gridPlugin]
});

</script>

</body>
</html>
